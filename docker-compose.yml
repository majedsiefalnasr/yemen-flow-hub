services:
  mysql:
    image: mysql:8.4
    container_name: yfh-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: cby_imports
      MYSQL_USER: cby
      MYSQL_PASSWORD: cby_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: yfh-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: yfh-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yfh-backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      APP_NAME: "CBY Imports Platform"
      APP_ENV: local
      APP_KEY: "base64:Dtx7olDoPRl27xn1bryBRhNKsEGVQyIY5MINd/3HaSs="
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      APP_TIMEZONE: Asia/Aden
      APP_LOCALE: ar
      LOG_CHANNEL: stack
      LOG_LEVEL: debug
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: cby_imports
      DB_USERNAME: cby
      DB_PASSWORD: cby_password
      SESSION_DRIVER: database
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      REDIS_HOST: redis
      REDIS_PASSWORD: "null"
      REDIS_PORT: 6379
      SANCTUM_STATEFUL_DOMAINS: localhost:3000,127.0.0.1:3000,localhost:3010,127.0.0.1:3010
      SESSION_DOMAIN: "null"
      FRONTEND_URL: http://localhost:3000
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:3010,http://127.0.0.1:3010
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_USERNAME: "null"
      MAIL_PASSWORD: "null"
      MAIL_ENCRYPTION: "null"
      MAIL_FROM_ADDRESS: no-reply@yemen-flow-hub.local
      MAIL_FROM_NAME: "CBY Imports Platform"
      APP_DEMO_ROLE_SWITCH: "true"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/up >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yfh-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8000
      HOST: 0.0.0.0
      PORT: 3000
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
