name: Frontend Parity Evidence

# Yemen Flow Hub — Epic 9, Story 9.1 + Story 9.5
# Two jobs:
#   parity-evidence  — gates any UI-touching change that lacks a parity-evidence triplet
#   visual-regression — runs Playwright visual baselines against parity-locked pages
#
# The on.paths filter determines which PRs trigger this workflow.

on:
  pull_request:
    branches: [main]
    paths:
      - "frontend/app/**"
      - "frontend/app/assets/css/**"
      - "frontend/scripts/check-parity-evidence.ts"
      - "_bmad-output/parity-evidence/**"
      - "frontend/tests/visual/**"

jobs:
  parity-evidence:
    name: Verify parity-evidence triplets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run parity-evidence check
        working-directory: frontend
        run: npx --yes tsx scripts/check-parity-evidence.ts

  visual-regression:
    name: Visual regression — parity-locked pages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: frontend
        # Install Chromium only — keeps CI time and disk usage bounded
        run: npx playwright install --with-deps chromium

      - name: Run visual regression tests
        working-directory: frontend
        # Playwright's webServer config starts `npm run dev` and tears it down.
        # Dev mode matches the environment baselines were captured in
        # (DEVTOOLS_MASK targets Nuxt devtools elements that only exist in dev).
        run: npm run test:visual
        env:
          PLAYWRIGHT_BASE_URL: "http://localhost:3000"

      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: frontend/test-results/
          retention-days: 7
