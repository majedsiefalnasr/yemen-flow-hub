# Team override for bmad-dev-story skill.
# Committed — applies to every developer on this project.
# Merged on top of .claude/skills/bmad-dev-story/customize.toml (base defaults).

[workflow]

# SocratiCode is MANDATORY before any implementation work.
# Every story run must index-check and search before touching code.
persistent_facts = [
  "SocratiCode is the required codebase intelligence layer for this project. Use the active MCP client’s SocratiCode tools (logical tool names: codebase_index, codebase_status, codebase_search, codebase_symbol, codebase_impact, codebase_flow, codebase_graph_query). In Claude Code these may appear as mcp__plugin_socraticode_socraticode__*. In Codex they are provided by the configured socraticode MCP server. You MUST use them — they are not optional.",
  "BEFORE modifying any existing file: call codebase_symbol to locate the symbol, then codebase_impact to understand what would break. Skipping this step is a HALT condition.",
  "BEFORE creating new code that interacts with existing services or models: call codebase_search with a semantic query to find related code and avoid duplication.",
  "BEFORE completing each task: call codebase_flow on any new public function you added to confirm the call chain is correct.",
  "SocratiCode tool quick-reference: codebase_index (index/re-index a path) · codebase_search (semantic search) · codebase_symbol (find class/function) · codebase_flow (trace execution) · codebase_impact (change impact) · codebase_graph_query (dependency graph).",
  "The project codebase is indexed at /Users/majedsiefalnasr/Documents/Work/Ultimate-Solutions-EGY/yemen-flow-hub/code. If codebase_search returns no results, call codebase_index on that path first to build or refresh the index.",
  "PARITY-EVIDENCE GATE (Epic 9, Story 9.1): Any story whose file list touches `frontend/app/**/*.vue` or `frontend/app/assets/css/**` is INCOMPLETE until a `_bmad-output/parity-evidence/<area>/<page>/` directory exists with `lovable.png`, `current.png`, and `side-by-side.png` committed in the same change. Missing or stale evidence is a HALT condition before marking the story complete. Derivation: strip `frontend/app/` and `.vue`, collapsing nested directories — examples: `frontend/app/pages/login.vue` → `auth/login`; `frontend/app/pages/requests/[id]/index.vue` → `requests/detail`. To skip the check on comment-only or non-rendering edits, the Vue file's first non-blank line must be the marker `// @parity-exempt`. Run `npx tsx frontend/scripts/check-parity-evidence.ts` against the changed file list to verify.",
]

# On activation, verify SocratiCode is available and the index is fresh.
activation_steps_append = [
  "Call the active SocratiCode MCP server's codebase_search with query='WorkflowService transition' and projectPath='/Users/majedsiefalnasr/Documents/Work/Ultimate-Solutions-EGY/yemen-flow-hub/code' to verify the index is live. If it returns results, confirm to the user that SocratiCode is active and indexed. If it returns an error or empty results, call codebase_index with projectPath='/Users/majedsiefalnasr/Documents/Work/Ultimate-Solutions-EGY/yemen-flow-hub/code', then use codebase_status until indexing is complete or tell the user indexing has started in the background.",
  "PARITY-EVIDENCE PRE-FLIGHT (Epic 9, Story 9.1): If the active story's File List touches `frontend/app/**/*.vue` or `frontend/app/assets/css/**`, enumerate each target page and either (a) verify the triplet `_bmad-output/parity-evidence/<area>/<page>/{lovable.png,current.png,side-by-side.png}` already exists, or (b) queue creation of the missing triplets in the task plan before claiming completion. Use the derivation rules and `@parity-exempt` marker described in `persistent_facts`. Refuse to mark the story complete if any required triplet is missing.",
]
